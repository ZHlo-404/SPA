config_name: 'hpl_mit'

DATASET:
  dset_name: 'mit'
  dset_split: '1'
  name: 'mitstates'
  root_dir: 'datasets/mit-states'
  splitname: 'compositional-split-natural'
  split_files_loc: 'data_files/MIT'

DISTRIBUTED:
  world_size: 1

MODEL:
  #attn_normalized: True #wait to be del

  attr_emb_dim: 300
  aux_loss_reweight: False
  classifier: 'cosine'
  cosine_cls_temp: 0.01
  obj_cosine_cls_temp: 0.01
  attr_cosine_cls_temp: 0.01
  #cross_att_dim: 128 #wait to be del
  drop_input: 0.0
  dropout_cross_attn: 0.0
  emb_dim: 300
  emb_loss_main: 0.1
  extra_pair_loss_ratio: 0.2
  extra_attr_loss_ratio: 0 #0.05
  extra_obj_loss_ratio: 0 #0.05
  extra_neighbor_weight: 0.05
  seen_loss_ratio: 0.1
  smoothing: 0.8
  unseen_loss_ratio: 0.1
  w_loss_attr: 0.05
  w_loss_main: 1.0
  w_loss_obj: 0.05
  #image_pair_multihead_attn: False #wait to be del
  image_pair_multihead_attn_dim: 256
  image_pair_multihead_num_heads: 2
  # img_drop_last: 0.0 #wait to be del
  #img_emb_dim: 512 #wait to be del
  img_emb_drop: 0.3
  #img_emb_method: 'conv_interm' #wait to be del
  img_final_bias: True
  #lambda_attn: 10.0 #wait to be del
  load_checkpoint: False
  #low_dim_cross_att: False #wait to be del
  name: 'oaclipv3'
  neigh_num: 7

  obj_emb_dim: 300
  optim_weights: ''
  use_attr_loss: False #True
  use_composed_pair_loss: True
  use_emb_pair_loss: True #True
  use_extra_pair_loss: False #True
  use_extra_attr_loss: False #False
  use_extra_obj_loss: False #False
  #use_fg_estimator: False #False wait to be del
  use_obj_loss: False #True
  weights: ''
  wordemb_attribute_code: 'simple'
  wordemb_attribute_code_fc: 'simple'
  wordemb_compose: 'linear'
  wordemb_compose_dropout: 0.05
  wordemb_compose_final: 'simple'
  wordemb_final_bias: True
  wordemb_object_code: 'simple'
  #wordembs: 'clip_CLIP' #wait to be del
  ao_dropout: 0.3

TRAIN:
  batch_size: 256
  checkpoint_dir:  'checkpoints'
  clip_type: 'res18'
  comb_features: False
  decay_factor: 0.1
  decay_patience: 2
  decay_strategy: 'milestone'
  disp_interval: 93
  eval_every_epoch: 1

  final_max_epoch: 20 #150
  finetune_backbone: False
  log_dir: 'tensorboards'
  lr: 1e-3 #3e-5
  lr_decay_milestones: [120, 130]
  lr_encoder: 3e-5
  lr_word_embedding: 5e-5
  max_epoch: 20 #150
  n_sample_hard_negative: 25
  num_workers: 4
  sample_hard_negative: True
  sample_negative_pairs: -1
  sample_similar_object: False
  save_every_epoch: 1
  seed: 124
  start_epoch: 1
  start_epoch_validate: 0
  test_batch_size: 256
  use_precomputed_features: False
  wd: 1e-6
  wd_encoder: 5e-5
  clip_model: 'ViT-B/32'
  # clip_model: 'ViT-L/14'
  context_length: 8
  adapter_dim: 64
  adapter_dropout: 0.1
  cmt_layers: 3
  init_lamda: 0.1
  cross_attn_dropout: 0.1
  pair_loss_weight: 1.0
  pair_inference_weight: 1.0
  attr_loss_weight: 1.0
  attr_inference_weight: 1.0
  obj_loss_weight: 1.0
  obj_inference_weight: 1.0


EVAL:
  topk: 1
